name: Generate Cantonese audio

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerate ALL audio (use after changing rate/overrides)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - data/lessons.js
      - data/stories.js
      - data/wordbank.js

permissions:
  contents: write

concurrency:
  group: generate-audio
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install edge-tts
        run: pip install edge-tts

      - name: Generate audio
        run: python3 scripts/generate_audio.py ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      - name: Commit audio if changed
        run: |
          if [ -n "$(git status --porcelain audio)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add audio
            git commit -m "Auto-generate Cantonese audio [skip ci]"
            git push
          else
            echo "No audio changes to commit."
          fi
